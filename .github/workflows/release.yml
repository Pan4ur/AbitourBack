name: Build And Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-and-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Build fat jar
        shell: bash
        run: |
          set -euo pipefail

          if ./gradlew --no-daemon clean buildFatJar --console=plain; then
            true
          else
            ./gradlew --no-daemon clean shadowJar --console=plain
          fi

      - name: Prepare release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          JAR_PATH="$(find build/libs -maxdepth 1 -type f \( -name '*-all.jar' -o -name '*-shadow.jar' \) | head -n 1)"
          test -n "${JAR_PATH}"
          cp "${JAR_PATH}" "dist/abitour-server.jar"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: abitour-server-jar
          path: dist/abitour-server.jar

      - name: Publish rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          target_commitish: ${{ github.sha }}
          files: dist/abitour-server.jar
          overwrite_files: true
          make_latest: false
          generate_release_notes: false
          body: |
            Automated rolling release from `main`.

            Commit: `${{ github.sha }}`

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/abitour-server.jar
          overwrite_files: true
          generate_release_notes: true
